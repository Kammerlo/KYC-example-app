server:
  port: 9000

spring:
  datasource:
    name: postgres
    url: ${DB_URL:jdbc:postgresql://localhost:5432/postgres?currentSchema=kyc}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: ${DB_DRIVER_CLASS_NAME:org.postgresql.Driver}

  jpa:
    database-platform: ${DB_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
    properties:
      hibernate:
        default_schema: ${DB_SCHEMA:kyc}
    hibernate:
      ddl-auto: none

  sql:
    init:
      mode: never

  flyway:
    out-of-order: false
    url: ${DB_URL:jdbc:postgresql://localhost:5432/postgres}
    user: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    schemas: ${DB_SCHEMA:kyc}
    locations:
      - classpath:db/store/{vendor}
      - classpath:db/migration/{vendor}
    baselineOnMigrate: true
    enabled: true
    validateMigrationNaming: true

keri:
  url: http://localhost:3901 # https://keria.qa.reeve.cf-deployments.org
  booturl: http://localhost:3903 # https://keria-boot.qa.reeve.cf-deployments.org
  identifier:
    bran: 0ADF2TpptgqcDE5IQUF1H
    name: identity
    role: agent
    registry-name: kyc-registry
  schema:
    base-url: https://cred-issuance.demo.idw-sandboxes.cf-deployments.org/oobi/
    schemas:
      USER:
        said: EL9oOWU_7zQn_rD--Xsgi3giCWnFDaNvFMUGTOZx1ARO # Foundation Employee Credential
        label: "Basic KYC"
      INSTITUTIONAL:
        said: ${KERI_SCHEMA_INSTITUTIONAL_SAID:ENPXp1vQzRF6JwIuS-mp2U8Uf1MoADoP_GqQ62VsDZWY} # Legal Entity vLEI Credential
        label: "Institutional KYC"
      VLEI:
        said: ${KERI_SCHEMA_VLEI_SAID:ENPXp1vQzRF6JwIuS-mp2U8Uf1MoADoP_GqQ62VsDZWY} # Legal Entity vLEI Credential
        label: "vLEI Credential"
  signing-mnemonic: ${KERI_SIGNING_MNEMONIC:nest wild farm beyond decide arm chuckle home raven card parrot nothing crazy casino hub broken scan height marine movie gloom village common off}

cardano:
  blockfrost:
    url: ${CARDANO_BLOCKFROST_URL:https://cardano-preview.blockfrost.io/api/v0/}
    key: ${CARDANO_BLOCKFROST_KEY:previewvREIf0sMD4UsByIdbY2BhUx19MHsRqY2}
  issuer:
    pkh:  ${CARDANO_ISSUER_PKH:9b29620b9a0c724f20655aa0df628d08bb10d6af7af28d39373d6947}   # 28-byte payment key hash hex (56 chars)
    vkey: ${CARDANO_ISSUER_VKEY:5f0e88a5c707b7372dfb80cbd877389be14ec87fd300a1083aa0653ef3ec6a84}  # 32-byte raw Ed25519 public key hex (64 chars) — required for TEL datum
  network: preview

apiPrefix: ${API_PREFIX:/yaci-api}
